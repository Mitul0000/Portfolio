<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DigiFello — AI Growth Roadmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-red-600 to-rose-700 min-h-screen font-sans">
  <div class="max-w-6xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="bg-white/10 text-white px-3 py-2 rounded-lg font-bold">DigiFello</div>
        <div class="text-white/90">
          <h1 class="text-2xl font-semibold">DigiFello AI Growth Roadmap</h1>
          <p class="text-sm opacity-80">30-day content roadmap + growth predictions — powered by DigiFello AI</p>
        </div>
      </div>
    </header>

    <main class="grid grid-cols-12 gap-6">
      <section class="col-span-4 bg-white/5 p-6 rounded-2xl shadow-lg">
        <h2 class="text-white text-lg font-semibold mb-3">Input</h2>
        <label class="block mb-2 text-sm text-white/80">Niche</label>
        <input id="niche" class="w-full p-3 rounded-lg bg-white/5 text-white" placeholder="e.g. Fitness, AI Tools, Baking">

        <label class="block mt-3 mb-2 text-sm text-white/80">Platform</label>
        <select id="platform" class="w-full p-3 rounded-lg bg-white/5 text-white">
          <option>YouTube</option>
          <option>TikTok</option>
          <option>Instagram</option>
          <option>Facebook</option>
        </select>

        <label class="block mt-3 mb-2 text-sm text-white/80">Focus / Description</label>
        <input id="idea" class="w-full p-3 rounded-lg bg-white/5 text-white" placeholder="e.g. Budget fitness for busy people">

        <label class="block mt-3 mb-2 text-sm text-white/80">Channel / Page Name</label>
        <input id="channel" class="w-full p-3 rounded-lg bg-white/5 text-white" placeholder="e.g. FitPro">

        <label class="block mt-3 mb-2 text-sm text-white/80">Current Subscribers / Followers</label>
        <input id="subs" type="number" class="w-full p-3 rounded-lg bg-white/5 text-white" placeholder="e.g. 500">

        <div class="mt-4 flex gap-3">
          <button id="generate" class="flex-1 bg-gradient-to-r from-rose-500 to-yellow-500 text-black p-3 rounded-lg font-semibold shadow-lg hover:scale-[1.02] transition">✨ Generate Roadmap</button>
        </div>
      </section>

      <section class="col-span-8 bg-white/6 p-6 rounded-2xl shadow-xl">
        <div class="flex justify-between items-start">
          <h2 class="text-white text-lg font-semibold">Plan & Predictions</h2>
          <div class="text-white/80 text-sm">Status: <span id="status">Idle</span></div>
        </div>

        <div id="guidelines" class="text-white/90 mt-4 p-4 bg-white/10 rounded-lg hidden"></div>

        <div id="visualTop" class="mt-4 grid grid-cols-3 gap-4">
          <div class="bg-white/5 p-4 rounded-lg">
            <h3 class="text-sm text-white/80">Estimated Reach</h3>
            <div id="reach" class="text-white text-2xl font-bold mt-2">—</div>
          </div>
          <div class="bg-white/5 p-4 rounded-lg">
            <h3 class="text-sm text-white/80">Growth Milestones</h3>
            <canvas id="milestoneChart" height="100"></canvas>
          </div>
          <div class="bg-white/5 p-4 rounded-lg">
            <h3 class="text-sm text-white/80">Content Types</h3>
            <canvas id="typeChart" height="100"></canvas>
          </div>
        </div>

        <div id="planArea" class="mt-6 space-y-4 max-h-[56vh] overflow-auto pr-2"></div>

        <div id="downloadBtns" class="mt-4 flex justify-end gap-3 hidden">
          <button id="pdfBtn" class="bg-white/10 text-white p-2 rounded-lg">📄 Download PDF</button>
          <button id="wordBtn" class="bg-white/10 text-white p-2 rounded-lg">📘 Download Word</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
